<script>
    const cards = document.querySelectorAll(".vote-card");

        cards.forEach(card => {
            const checkbox = card.querySelector("input");
            const title = card.querySelector("h2");

            const movieName = card.dataset.title;
            let votes = parseInt(card.dataset.votes);

            checkbox.addEventListener("change", () => {

                document.querySelectorAll(".vote-card").forEach(c => {
                    const cb = c.querySelector("input");
                    const t = c.querySelector("h2");

                    cb.checked = false;
                    t.textContent = c.dataset.title;
                });

                checkbox.checked = true;
                votes++;
                title.textContent = "STEMMEN " + votes;
            });
    });
</script>
